<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World of Legends</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    #renderCanvas {
      width: 100%; height: 100%;
      touch-action: none;
      display: block;
    }

    /* ─── Login Screen ─────────────────────────────────────────────── */
    #login-screen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 40%, #0f2460 100%);
      z-index: 100;
    }
    .login-box {
      text-align: center; color: #e0e0ff;
    }
    .login-box h1 {
      font-size: 3rem; margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none;
    }
    .login-box .subtitle {
      font-size: 1rem; color: #8888bb; margin-bottom: 2rem;
    }
    .login-box input {
      display: block; width: 280px; padding: 12px 16px; margin: 0 auto 16px;
      border: 2px solid #334; border-radius: 8px;
      background: #111128; color: #e0e0ff; font-size: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: #ffd700; }
    .login-box input::placeholder { color: #555577; }
    .login-box button {
      display: block; width: 280px; padding: 12px; margin: 0 auto;
      border: none; border-radius: 8px; cursor: pointer;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #1a1a2e; font-size: 1.1rem; font-weight: 700;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .login-box button:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
    .login-box button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-error {
      color: #ff6b6b; margin-top: 12px; font-size: 0.9rem; min-height: 1.2em;
    }

    /* ─── HUD ──────────────────────────────────────────────────────── */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 10;
    }
    #hud-top-left {
      position: absolute; top: 12px; left: 12px;
      color: #fff; font-size: 0.85rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #hud-top-right {
      position: absolute; top: 12px; right: 12px;
      color: #fff; font-size: 0.85rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #minimap {
      position: absolute; top: 12px; right: 12px;
      width: 150px; height: 150px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
    }

    /* ─── Chat Panel ───────────────────────────────────────────────── */
    #chat-panel {
      position: absolute; bottom: 12px; left: 12px;
      width: 360px; z-index: 20;
    }
    #chat-messages {
      height: 180px; overflow-y: auto;
      background: rgba(0,0,0,0.6); border-radius: 8px 8px 0 0;
      padding: 8px; color: #ddd; font-size: 0.85rem;
      scrollbar-width: thin; scrollbar-color: #444 transparent;
    }
    #chat-messages .msg { margin-bottom: 4px; line-height: 1.3; }
    #chat-messages .msg .name { color: #ffd700; font-weight: 600; }
    #chat-messages .msg .system { color: #88aaff; font-style: italic; }
    #chat-input-row {
      display: flex;
      background: rgba(0,0,0,0.7); border-radius: 0 0 8px 8px;
      overflow: hidden;
    }
    #chat-input {
      flex: 1; padding: 8px 12px; border: none;
      background: transparent; color: #fff; font-size: 0.9rem;
      outline: none;
    }
    #chat-input::placeholder { color: #666; }
    #chat-send {
      padding: 8px 16px; border: none; cursor: pointer;
      background: #ffd700; color: #1a1a2e; font-weight: 700;
    }
    #chat-send:hover { background: #ffed4a; }

    /* ─── Controls hint ────────────────────────────────────────────── */
    #controls-hint {
      position: absolute; bottom: 12px; right: 12px;
      color: rgba(255,255,255,0.5); font-size: 0.75rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <h1>World of Legends</h1>
      <p class="subtitle">A browser MMORPG adventure</p>
      <input type="text" id="username-input" placeholder="Enter your name..." maxlength="16" autocomplete="off" />
      <button id="join-btn">Enter World</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <!-- HUD (hidden until joined) -->
  <div id="hud" style="display:none">
    <div id="hud-top-left">
      <div id="fps-counter">FPS: --</div>
      <div id="player-count">Players: --</div>
      <div id="player-pos">Pos: --</div>
    </div>
    <canvas id="minimap" width="150" height="150"></canvas>
  </div>

  <!-- Chat Panel (hidden until joined) -->
  <div id="chat-panel" style="display:none">
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Press Enter to chat..." maxlength="200" />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint" style="display:none">
    WASD: Move &nbsp;|&nbsp; Mouse: Look &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; Space: Jump &nbsp;|&nbsp; Enter: Chat
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
