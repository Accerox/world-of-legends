<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World of Legends</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    /* ─── Game Canvas ──────────────────────────────────────────────── */
    #renderCanvas {
      width: 100%; height: 100%;
      touch-action: none;
      display: none;
    }

    /* ─── Shared Screen Base ───────────────────────────────────────── */
    .screen-base {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 40%, #0f2460 100%);
      z-index: 100;
      overflow-y: auto;
    }

    /* ─── Auth Screen ──────────────────────────────────────────────── */
    .auth-box {
      text-align: center; color: #e0e0ff;
      width: 360px; max-width: 90vw;
    }
    .auth-title {
      font-size: 3rem; margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-subtitle {
      font-size: 1rem; color: #8888bb; margin-bottom: 2rem;
    }
    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 1.5rem;
      border-bottom: 2px solid #334;
    }
    .auth-tab {
      flex: 1; padding: 10px; border: none; cursor: pointer;
      background: transparent; color: #8888bb; font-size: 1rem; font-weight: 600;
      transition: color 0.2s, border-color 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .auth-tab.active {
      color: #ffd700;
      border-bottom-color: #ffd700;
    }
    .auth-tab:hover { color: #e0e0ff; }
    .auth-form input {
      display: block; width: 100%; padding: 12px 16px; margin-bottom: 12px;
      border: 2px solid #334; border-radius: 8px;
      background: #111128; color: #e0e0ff; font-size: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: #ffd700; }
    .auth-form input::placeholder { color: #555577; }
    .auth-submit {
      display: block; width: 100%; padding: 12px; margin-top: 4px;
      border: none; border-radius: 8px; cursor: pointer;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #1a1a2e; font-size: 1.1rem; font-weight: 700;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .auth-submit:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-error {
      color: #ff6b6b; margin-top: 12px; font-size: 0.9rem; min-height: 1.2em;
    }
    .auth-switch {
      color: #8888bb; margin-top: 16px; font-size: 0.9rem;
    }
    .auth-switch a {
      color: #ffd700; text-decoration: none; font-weight: 600;
    }
    .auth-switch a:hover { text-decoration: underline; }

    /* ─── Character Select Screen ──────────────────────────────────── */
    .cs-box {
      text-align: center; color: #e0e0ff;
      width: 480px; max-width: 95vw;
    }
    .cs-title {
      font-size: 2.5rem; margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .cs-subtitle {
      font-size: 1rem; color: #8888bb; margin-bottom: 1.5rem;
    }
    .cs-empty {
      padding: 2rem 1rem;
    }
    .cs-empty-icon { font-size: 4rem; margin-bottom: 1rem; }
    .cs-empty-text { font-size: 1.2rem; color: #e0e0ff; margin-bottom: 0.5rem; }
    .cs-empty-hint { font-size: 0.9rem; color: #8888bb; margin-bottom: 1.5rem; }
    .cs-list {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 1.5rem;
    }
    .cs-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 2px solid #334;
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s;
      cursor: default;
    }
    .cs-card:hover {
      border-color: #ffd700;
      background: rgba(255,215,0,0.05);
    }
    .cs-card-icon { font-size: 2rem; }
    .cs-card-info { flex: 1; text-align: left; }
    .cs-card-name { font-size: 1.1rem; font-weight: 700; color: #ffd700; }
    .cs-card-detail { font-size: 0.85rem; color: #aab; }
    .cs-card-actions { display: flex; gap: 8px; }
    .cs-play-btn {
      padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #1a1a2e; font-weight: 700; font-size: 0.9rem;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .cs-play-btn:hover { transform: scale(1.05); box-shadow: 0 2px 12px rgba(255,215,0,0.3); }
    .cs-delete-btn {
      padding: 8px 12px; border: 1px solid #553; border-radius: 6px; cursor: pointer;
      background: transparent; color: #ff6b6b; font-size: 0.85rem;
      transition: background 0.2s;
    }
    .cs-delete-btn:hover { background: rgba(255,107,107,0.15); }
    .cs-create-btn {
      display: inline-block; padding: 14px 32px;
      border: 2px dashed #ffd700; border-radius: 10px; cursor: pointer;
      background: transparent; color: #ffd700; font-size: 1.1rem; font-weight: 700;
      transition: background 0.2s, transform 0.1s;
    }
    .cs-create-btn:hover { background: rgba(255,215,0,0.1); transform: scale(1.02); }
    .cs-max-hint { color: #8888bb; font-size: 0.85rem; margin-top: 0.5rem; }
    .cs-logout-btn {
      display: inline-block; margin-top: 1rem; padding: 8px 20px;
      border: 1px solid #555; border-radius: 6px; cursor: pointer;
      background: transparent; color: #888; font-size: 0.85rem;
      transition: color 0.2s;
    }
    .cs-logout-btn:hover { color: #ff6b6b; border-color: #ff6b6b; }

    /* ─── Character Creator Screen ─────────────────────────────────── */
    .cc-box {
      color: #e0e0ff;
      width: 800px; max-width: 95vw;
      padding: 1.5rem;
    }
    .cc-header { text-align: center; margin-bottom: 0.5rem; }
    .cc-title {
      font-size: 2rem; margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .cc-step { font-size: 0.9rem; color: #8888bb; }
    .cc-progress {
      width: 100%; height: 4px; background: #222;
      border-radius: 2px; margin-bottom: 1rem; overflow: hidden;
    }
    .cc-progress-fill {
      height: 100%; background: linear-gradient(90deg, #ffd700, #ff8c00);
      border-radius: 2px; transition: width 0.3s ease;
    }
    .cc-synergy-hint {
      text-align: center; color: #ffd700; font-size: 0.85rem; margin-bottom: 1rem;
    }

    /* Race grid */
    .cc-race-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) {
      .cc-race-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .cc-race-card {
      padding: 12px; border: 2px solid #334; border-radius: 10px;
      background: rgba(255,255,255,0.03); cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.1s;
      text-align: center;
    }
    .cc-race-card:hover {
      border-color: #888; background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .cc-race-card.selected {
      border-color: #ffd700; background: rgba(255,215,0,0.08);
      box-shadow: 0 0 20px rgba(255,215,0,0.15);
    }
    .cc-race-emoji { font-size: 2.5rem; margin-bottom: 4px; }
    .cc-race-name { font-size: 1rem; font-weight: 700; color: #ffd700; margin-bottom: 2px; }
    .cc-race-desc { font-size: 0.75rem; color: #aab; margin-bottom: 8px; line-height: 1.3; }
    .cc-stats { text-align: left; }
    .cc-stat-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .cc-stat-label { font-size: 0.65rem; color: #888; width: 26px; text-align: right; }
    .cc-stat-bar-bg {
      flex: 1; height: 4px; background: #222; border-radius: 2px; overflow: hidden;
    }
    .cc-stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .cc-stat-value { font-size: 0.65rem; color: #aab; width: 16px; }

    /* Class grid */
    .cc-class-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) {
      .cc-class-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .cc-class-card {
      padding: 12px; border: 2px solid #334; border-radius: 10px;
      background: rgba(255,255,255,0.03); cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.1s;
      text-align: center;
    }
    .cc-class-card:hover {
      border-color: #888; background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .cc-class-card.selected {
      border-color: #ffd700; background: rgba(255,215,0,0.08);
      box-shadow: 0 0 20px rgba(255,215,0,0.15);
    }
    .cc-class-top { display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 4px; }
    .cc-class-emoji { font-size: 1.5rem; }
    .cc-class-name { font-size: 0.95rem; font-weight: 700; color: #e0e0ff; }
    .cc-synergy { color: #ffd700; font-size: 1rem; }
    .cc-class-role { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; }
    .cc-class-desc { font-size: 0.7rem; color: #aab; line-height: 1.3; }

    /* Name input */
    .cc-name-section { text-align: center; padding: 2rem 0; }
    .cc-name-preview { font-size: 5rem; margin-bottom: 1rem; }
    .cc-name-input {
      display: block; width: 320px; max-width: 90%; padding: 14px 18px; margin: 0 auto 8px;
      border: 2px solid #334; border-radius: 10px;
      background: #111128; color: #ffd700; font-size: 1.3rem; font-weight: 700;
      text-align: center; outline: none; transition: border-color 0.2s;
    }
    .cc-name-input:focus { border-color: #ffd700; }
    .cc-name-input::placeholder { color: #555577; font-weight: 400; }
    .cc-name-hint { font-size: 0.8rem; color: #666; }
    .cc-error { color: #ff6b6b; font-size: 0.9rem; min-height: 1.2em; margin-top: 8px; }

    /* Confirm card */
    .cc-confirm-card {
      text-align: center; padding: 2rem;
      border: 2px solid #ffd700; border-radius: 16px;
      background: rgba(255,215,0,0.05);
      box-shadow: 0 0 30px rgba(255,215,0,0.1);
      margin-bottom: 1rem;
      max-width: 400px; margin-left: auto; margin-right: auto;
    }
    .cc-confirm-emoji { font-size: 5rem; margin-bottom: 0.5rem; }
    .cc-confirm-name { font-size: 2rem; font-weight: 700; color: #ffd700; margin-bottom: 0.25rem; }
    .cc-confirm-detail { font-size: 1.1rem; color: #e0e0ff; margin-bottom: 0.25rem; }
    .cc-confirm-role { font-size: 0.9rem; color: #88aaff; margin-bottom: 1rem; }
    .cc-confirm-stats { max-width: 250px; margin: 0 auto; }

    /* Navigation */
    .cc-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 0.5rem;
    }
    .cc-back-btn {
      padding: 10px 24px; border: 1px solid #555; border-radius: 8px; cursor: pointer;
      background: transparent; color: #aab; font-size: 0.95rem;
      transition: color 0.2s, border-color 0.2s;
    }
    .cc-back-btn:hover { color: #fff; border-color: #888; }
    .cc-next-btn, .cc-create-final-btn {
      padding: 12px 28px; border: none; border-radius: 8px; cursor: pointer;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #1a1a2e; font-size: 1rem; font-weight: 700;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .cc-next-btn:hover, .cc-create-final-btn:hover {
      transform: scale(1.02); box-shadow: 0 4px 20px rgba(255,215,0,0.3);
    }
    .cc-next-btn.disabled, .cc-next-btn:disabled {
      opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none;
    }
    .cc-create-final-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ─── HUD ──────────────────────────────────────────────────────── */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 10;
    }
    #hud-top-left {
      position: absolute; top: 12px; left: 12px;
      color: #fff; font-size: 0.85rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #hud-top-right {
      position: absolute; top: 12px; right: 12px;
      color: #fff; font-size: 0.85rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #minimap {
      position: absolute; top: 12px; right: 12px;
      width: 150px; height: 150px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
    }

    /* ─── Chat Panel ───────────────────────────────────────────────── */
    #chat-panel {
      position: fixed; bottom: 12px; left: 12px;
      width: 360px; z-index: 20;
    }
    #chat-messages {
      height: 180px; overflow-y: auto;
      background: rgba(0,0,0,0.6); border-radius: 8px 8px 0 0;
      padding: 8px; color: #ddd; font-size: 0.85rem;
      scrollbar-width: thin; scrollbar-color: #444 transparent;
    }
    #chat-messages .msg { margin-bottom: 4px; line-height: 1.3; }
    #chat-messages .msg .name { color: #ffd700; font-weight: 600; }
    #chat-messages .msg .system { color: #88aaff; font-style: italic; }
    #chat-input-row {
      display: flex;
      background: rgba(0,0,0,0.7); border-radius: 0 0 8px 8px;
      overflow: hidden;
    }
    #chat-input {
      flex: 1; padding: 8px 12px; border: none;
      background: transparent; color: #fff; font-size: 0.9rem;
      outline: none;
    }
    #chat-input::placeholder { color: #666; }
    #chat-send {
      padding: 8px 16px; border: none; cursor: pointer;
      background: #ffd700; color: #1a1a2e; font-weight: 700;
    }
    #chat-send:hover { background: #ffed4a; }

    /* ─── Controls hint ────────────────────────────────────────────── */
    #controls-hint {
      position: absolute; bottom: 12px; right: 12px;
      color: rgba(255,255,255,0.5); font-size: 0.75rem;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 10; pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Screen 1: Auth (Login/Register) -->
  <div id="auth-screen" class="screen-base" style="display:flex"></div>

  <!-- Screen 2: Character Select -->
  <div id="character-select-screen" class="screen-base" style="display:none"></div>

  <!-- Screen 3: Character Creator -->
  <div id="character-creator-screen" class="screen-base" style="display:none"></div>

  <!-- Game canvas (hidden until playing) -->
  <canvas id="renderCanvas"></canvas>

  <!-- HUD (hidden until joined) -->
  <div id="hud" style="display:none">
    <div id="hud-top-left">
      <div id="fps-counter">FPS: --</div>
      <div id="player-count">Players: --</div>
      <div id="player-pos">Pos: --</div>
    </div>
    <canvas id="minimap" width="150" height="150"></canvas>
  </div>

  <!-- Chat Panel (hidden until joined) -->
  <div id="chat-panel" style="display:none">
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Press Enter to chat..." maxlength="200" />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint" style="display:none">
    WASD: Move &nbsp;|&nbsp; Mouse: Look &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; Space: Jump &nbsp;|&nbsp; Enter: Chat
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
