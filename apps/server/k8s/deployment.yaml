apiVersion: apps/v1
kind: Deployment
metadata:
  name: wol-game-server
  namespace: wol-game
  labels:
    app: wol-game-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wol-game-server
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wol-game-server
    spec:
      containers:
      - name: wol-game-server
        image: ghcr.io/accerox/wol-game-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
